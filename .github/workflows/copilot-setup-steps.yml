name: Setup CJK fonts for GitHub Copilot Coding Agent

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto-cjk \
            fonts-noto-cjk-extra \
            fonts-wqy-zenhei \
            fonts-wqy-microhei \
            fonts-arphic-ukai \
            fonts-arphic-uming \
            fonts-arphic-bkai00mp \
            fonts-arphic-bsmi00lp \
            fontconfig
          sudo fc-cache -fv
          
      - name: Set locale for CJK support
        run: |
          echo "LANG=zh_TW.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_TW.UTF-8" >> $GITHUB_ENV
          echo "FONTCONFIG_PATH=/etc/fonts" >> $GITHUB_ENV
          
      - name: Verify font installation
        run: |
          echo "Installed Traditional Chinese fonts:"
          fc-list | grep -i "noto.*cjk.*tc\|arphic\|wqy\|wenquanyi" | head -10
          echo ""
          echo "Available Traditional Chinese font families:"
          fc-list | grep -E "(TC|TW|Traditional|Arphic|WenQuanYi)" | wc -l
          echo "fonts installed successfully"
          echo ""
          echo "CJK fonts installed successfully for GitHub Copilot Coding Agent"
